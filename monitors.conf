# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# archlinux laptop — HDMI-A-1 external + eDP-1 laptop panel
monitor=HDMI-A-1,2560x1440@75,0x0,1.25
monitor=eDP-1,1920x1200@60,640x1152,1.25

# Assign workspaces 1-5 & 8-9 to the external monitor
workspace = 1, monitor:HDMI-A-1, s[true], f[true], name:coding, f[0]
workspace = 2, monitor:HDMI-A-1, name:ai
workspace = 3, monitor:HDMI-A-1, name:browser
workspace = 4, monitor:HDMI-A-1, name: mail
workspace = 5, monitor:HDMI-A-1, name: others
workspace = 6, monitor:eDP-1, s[true], name:browser+others
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1, f[0]
workspace = 10, monitor:eDP-1
workspace = 11, monitor:HDMI-A-1
workspace = 12, monitor:eDP-1
