# Application bindings
$terminal = $TERMINAL
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER , B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# Mouse extra keys
bindd = , mouse:275, Full Scren, exec, wtype -k Return
bindd = , mouse:276, Mouse screenshot, exec, omarchy-cmd-screenshot

# Unbind default SUPER+1-5 (they point to WS 1-5 in defaults, we rebind them below)
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14

# Switch workspaces with SUPER + [1-5] for WS 1-5
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5

# Switch workspaces with ALT + [1-5] for WS 6-10
bindd = ALT, code:10, Switch to workspace 6, workspace, 6
bindd = ALT, code:11, Switch to workspace 7, workspace, 7
bindd = ALT, code:12, Switch to workspace 8, workspace, 8
bindd = ALT, code:13, Switch to workspace 9, workspace, 9
bindd = ALT, code:14, Switch to workspace 10, workspace, 10

# Cycle workspaces with function keys (non-cycling 1..12)
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
bindd = , F1, Previous workspace, exec, /home/mdiloreto/.config/hypr/scripts/move-workspaces.sh -1
bindd = , F3, Next workspace, exec, /home/mdiloreto/.config/hypr/scripts/move-workspaces.sh +1

# Unbind default SUPER SHIFT+1-9 (they point to WS 1-9 in defaults, we rebind below)
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# Move active window to workspace with SUPER SHIFT + [1-5] for WS 1-5
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5

# Move active window to workspace with ALT SHIFT + [1-5] for WS 6-10
bindd = ALT SHIFT, code:10, Move window to workspace 6, movetoworkspace, 6
bindd = ALT SHIFT, code:11, Move window to workspace 7, movetoworkspace, 7
bindd = ALT SHIFT, code:12, Move window to workspace 8, movetoworkspace, 8
bindd = ALT SHIFT, code:13, Move window to workspace 9, movetoworkspace, 9
bindd = ALT SHIFT, code:14, Move window to workspace 10, movetoworkspace, 10


# Unbind default SUPER+6-0 (not used in new scheme)
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

# Unbind SUPER SHIFT ALT (not used)
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

# Switch keyboard layout
bindd = ALT, T, Switch keyboard layout, exec, /home/mdiloreto/.config/hypr/scripts/switch-layout.sh

